# Builds the Windows installer on a GitHub-hosted Windows runner, so no local
# Windows machine is needed. Two ways to get a setup.exe:
#   - Manual: GitHub → Actions → "build-installer" → Run workflow → download artifact.
#   - Release: push a tag like v0.1.0 → the exe is attached to a GitHub Release.
name: build-installer

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (self-contained win-x86)
        run: .\build\publish.ps1

      - name: Ensure Inno Setup
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --no-progress -y
          }

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\EzeeroomKeycardBridge.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezeeroom-keycard-bridge-setup
          path: installer/output/*.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/*.exe
